databaseChangeLog:
  - changeSet:
      id: 1
      author: melkx
      changes:
        - createTable:
            tableName: founders
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

  - changeSet:
      id: 2
      author: melkx
      changes:
        - createTable:
            tableName: employees
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: company_code
                  type: VARCHAR(60)
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: employees
            columnNames: email, company_code
            constraintName: uk_employees_email_company_code